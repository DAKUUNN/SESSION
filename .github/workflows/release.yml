name: Release Session

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Root-level install: this is an npm-workspaces monorepo, so apps/desktop's
      # dependencies (including the @session/shared-types and @session/design-tokens
      # workspace packages it imports) only resolve correctly from the repo root.
      #
      # `npm install` rather than `npm ci`: this repo's package-lock.json was
      # generated on macOS, and `npm ci` trusts the lockfile's optionalDependencies
      # resolution as-is instead of re-resolving for the current platform — a
      # known npm bug (npmc/cli#4828) that's more prone to trigger in npm
      # workspaces. It surfaces as the Windows build failing to find
      # @tauri-apps/cli-win32-x64-msvc's native binary. `npm install` re-resolves
      # optional platform packages for whichever OS is actually running.
      - name: Install dependencies
        run: npm install --include=dev

      - name: Install Tauri CLI globally
        run: npm install -g @tauri-apps/cli@^2

      - name: Verify Tauri CLI
        run: tauri --version

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: temporary-keychain-password
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Monorepo support: tauri.conf.json/src-tauri live under apps/desktop,
          # not at the repo root (unlike the flat-layout reference this workflow
          # is adapted from).
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Session ${{ github.ref_name }}'
          releaseBody: 'Session desktop release.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
